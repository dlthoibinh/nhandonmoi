<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>NHẬN ĐƠN MỚI EVN SPC</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0ea5e9">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Nhận đơn">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192-any.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

  <meta http-equiv="Content-Security-Policy"
        content="
          default-src 'self';
          frame-src https://script.google.com https://*.googleusercontent.com;
          connect-src 'self' https://script.google.com https://*.googleusercontent.com;
          img-src 'self' data: blob: https:;
          media-src 'self' data: blob: https:;
          style-src 'self' 'unsafe-inline';
          script-src 'self' 'unsafe-inline';
          worker-src 'self';
          base-uri 'self';
          form-action 'self' https://script.google.com https://*.googleusercontent.com;
          block-all-mixed-content;
        ">

  <style>
    :root{
      --safe-top:env(safe-area-inset-top,0px);
      --safe-right:env(safe-area-inset-right,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --safe-left:env(safe-area-inset-left,0px);
    }
    *{box-sizing:border-box}
    html,body{
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      background:#fff;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }
    #app{
      position:fixed;
      inset:0;
      width:100vw;
      height:100dvh;
      min-height:100vh;
      background:#fff;
      overflow:hidden;
    }
    #appFrame{
      position:absolute;
      left:0;
      top:0;
      width:100%;
      height:100%;
      border:0;
      margin:0;
      padding:0;
      background:#fff;
      display:block;
    }
    @supports (padding:max(0px)){
      #appFrame{
        padding-top:var(--safe-top);
        padding-right:var(--safe-right);
        padding-bottom:var(--safe-bottom);
        padding-left:var(--safe-left);
      }
    }
  </style>
</head>
<body>
  <main id="app">
    <iframe id="appFrame"
      title="Nhận đơn mới EVN SPC"
      src="https://script.google.com/macros/s/AKfycbwAJgSxWDGXYPI0kg-BHe3irmUwlGVPNJka464AOlegD6WDGS_C-kmvrU0tjFEhHaJ4/exec"
      allow="geolocation *; camera *; microphone *; fullscreen *; clipboard-read *; clipboard-write *; accelerometer *; gyroscope *; magnetometer *"
      referrerpolicy="no-referrer"
      loading="eager"></iframe>
  </main>

  <script>
    const BASE = location.pathname.endsWith('/') ? location.pathname : location.pathname.replace(/\/[^/]*$/, '/');

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register(BASE + 'sw.js', { scope: BASE })
          .then(reg => console.log('[PWA] Service worker:', reg.scope))
          .catch(err => console.warn('[PWA] Service worker lỗi:', err));
      });
    }
  </script>
</body>
</html>
